<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritime - Controle de Ponto</title> 
    
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // CORREÇÃO: Força o Tailwind a usar a estratégia de 'class' para o modo escuro.
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    
    <link rel="stylesheet" href="style.css"> 
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Configuração PWA -->
    <link rel="manifest" href="manifest.json">
    <!-- Ícone da Aba (Favicon) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏰</text></svg>">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .mensagem.sucesso { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .mensagem.erro { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
        .ultimo-registro { background-color: #fef3c7; font-weight: bold; border-left: 5px solid #fbbf24; }
        
        /* Efeito de tremor para botões ativos */
        .tremor { animation: tremor-animation 0.5s ease-in-out infinite alternate; }
        @keyframes tremor-animation {
            from { transform: translateX(-1px); }
            to { transform: translateX(1px); }
        }

        @keyframes fadeIn {
            from { background-color: #fef3c7; opacity: 0.5; } /* Amarelo claro e transparente */
            to { background-color: transparent; opacity: 1; }
        }

        .novo-registro-anim {
            animation: fadeIn 1.5s ease-out;
        }

        /* Animação customizada para o ícone de sol girar mais devagar */
        .fa-sun-slow-spin {
            animation: fa-spin 8s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 flex flex-col justify-center items-center p-4 min-h-screen transition-colors duration-500">
    <div class="veritime-card animate-page-in bg-white/70 dark:bg-slate-900/70 backdrop-blur-md p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-lg md:max-w-5xl mx-auto my-6 relative z-50 border border-white/20 dark:border-slate-700/50 transition-all duration-300">
        <div class="flex justify-between items-center w-full mb-4 mt-2"> 
            <header class="flex-grow text-center min-w-0 flex flex-col items-center">
                <p id="saudacao" class="text-center text-lg font-semibold text-slate-600 dark:text-slate-300 mb-2"></p>
                <!-- SUGESTÃO 2: Efeito de Pulso e Gradiente -->
                <a href="#" id="logo-container" class="no-underline text-center cursor-pointer">
                    <h1 class="text-4xl md:text-5xl font-extrabold uppercase tracking-widest leading-none 
                               bg-clip-text text-transparent bg-gradient-to-br from-teal-400 via-teal-500 to-cyan-500">
                        <i class="fas fa-clock text-3xl md:text-4xl mr-1 text-teal-500"></i>
                        VERITIME
                    </h1>
                    <p class="text-teal-600 dark:text-teal-400 text-sm italic transition-colors duration-300">O tempo no seu controle</p>
                </a>
            </header>
            
            <div id="menuHambuguer" class="relative ml-2 z-50"> 
                <button id="btnMenu" class="text-slate-600 dark:text-slate-300 hover:text-teal-600 focus:outline-none p-1">
                    <i class="fas fa-bars text-3xl"></i>
                </button>
                <div id="menuDropdown" class="hidden absolute w-48 bg-white dark:bg-slate-700 rounded-lg shadow-xl py-2 mt-2 border border-gray-200 dark:border-slate-600 right-0 top-full">
                    <a href="resumo.html" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-chart-pie fa-fw mr-2"></i> Resumo
                    </a>
                    <a href="relatorio.html" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-file-alt fa-fw mr-2"></i> Relatório
                    </a>
                    <a href="configuracoes.html" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-cogs fa-fw mr-2"></i> Configurações
                    </a>
                    <a href="download.html" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-download fa-fw mr-2"></i> Baixar App
                    </a>
                    <a href="contato.html" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-paper-plane fa-fw mr-2"></i> Contato
                    </a>
                    <a href="ajuda.html" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-question-circle fa-fw mr-2"></i> Ajuda
                    </a>

                    <div class="border-t border-gray-200 dark:border-slate-600 my-1"></div>

                    <a href="#" id="btnExportarCSV" class="block px-4 py-2 text-slate-800 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-600">
                        <i class="fas fa-file-csv fa-fw mr-2"></i> Exportar CSV
                    </a>
                    <a href="#" id="btnLimpar" class="block px-4 py-2 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/50">
                        <i class="fas fa-trash fa-fw mr-2"></i> Limpar Dados
                    </a>

                    <div class="border-t border-gray-200 my-1"></div>
                    <div class="px-4 py-2 flex items-center justify-between">
                        <span class="text-slate-800 dark:text-slate-200"><i class="fas fa-moon mr-2"></i> Modo Escuro</span>
                        <label class="switch">
                            <input type="checkbox" id="toggleDarkMode">
                            <span class="slider round"></span>
                        </label>
                    </div>

                </div>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 items-start">
            <!-- Coluna da Esquerda: Controle e Status -->
            <div class="flex flex-col gap-6">
                <div id="relogio" class="text-5xl font-mono font-bold text-center p-6 border-2 border-teal-500/30 rounded-2xl bg-slate-50 dark:bg-slate-800/50 text-slate-800 dark:text-teal-400 shadow-inner tracking-tighter">
                    00:00:00
                </div>

                <!-- NOVO DASHBOARD DE STATUS -->
                <div id="dashboardStatus" class="p-5 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50/50 dark:bg-slate-800/30 shadow-sm">
                    <div id="resumo" class="text-center text-lg font-semibold text-slate-700 dark:text-slate-300 mb-3">
                        Aguardando Entrada...
                    </div>
                    <div class="w-full h-4 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden relative shadow-inner">
                        <div id="progresso-barra" class="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all duration-700 ease-in-out" style="width: 0%;"></div>
                        <span class="absolute inset-0 flex items-center justify-center text-xs font-bold text-slate-800 dark:text-slate-100" id="progressoTexto">0%</span>
                    </div>
                </div>

                <div class="flex flex-wrap justify-between gap-2">
                    <button id="btnEntrada" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-95 w-full sm:w-[calc(50%-4px)] border-b-4 border-teal-800">
                        <i class="fas fa-play mr-2"></i> Entrada
                    </button>
                    <button id="btnSaidaAlmoco" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-95 w-full sm:w-[calc(50%-4px)] border-b-4 border-amber-700">
                        <i class="fas fa-mug-hot mr-2"></i> Pausa
                    </button>
                    <button id="btnVoltaAlmoco" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-95 w-full sm:w-[calc(50%-4px)] border-b-4 border-emerald-700">
                        <i class="fas fa-coffee mr-2"></i> Volta
                    </button>
                    <button id="btnSaida" class="bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-95 w-full sm:w-[calc(50%-4px)] border-b-4 border-rose-800">
                        <i class="fas fa-stop mr-2"></i> Saída
                    </button>
                </div>
                <div id="statusMensagem" class="p-3 mb-4 rounded font-semibold text-center" style="display:none;"></div>
            </div>

            <!-- Coluna da Direita: Histórico e Alarme -->
            <div class="flex flex-col gap-6">
                <!-- ACORDEÃO PARA REGISTROS -->
                <div class="border border-slate-200 dark:border-slate-700 rounded-2xl overflow-hidden shadow-sm bg-white/50 dark:bg-slate-800/30">
                    <button id="toggleRegistros" class="w-full p-4 hover:bg-slate-100 dark:hover:bg-slate-800/50 text-left font-bold text-slate-700 dark:text-slate-300 flex justify-between items-center transition-colors">
                        <span>Registro do Dia</span>
                        <i id="caretIcon" class="fas fa-chevron-down transition-transform"></i>
                    </button>
                    <div id="painelRegistros" class="hidden p-2">
                        <table id="tabelaRegistros" class="w-full border-collapse">
                            <thead class="bg-teal-600 text-white text-xs md:text-sm">
                                <tr>
                                    <th class="p-2 text-left">Jornada</th>
                                    <th class="p-2 text-left">Hora</th>
                                    <th class="p-2 text-left border-l border-teal-400">Pausas</th>
                                    <th class="p-2 text-left">Hora</th>
                                </tr>
                            </thead>
                            <tbody id="lista-registros" class="text-sm md:text-base"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Seção de Alarme -->
                <div class="p-6 border border-teal-500/20 rounded-2xl bg-teal-50/50 dark:bg-slate-800/50 shadow-inner backdrop-blur-sm">
                    <div class="flex flex-col items-center w-full">
                         <div class="flex items-center justify-between w-full mb-3">
                            <span class="font-bold text-slate-700 dark:text-slate-200">Alarme Almoço:</span>
                            <label class="switch scale-75">
                                <input type="checkbox" id="toggleAlarmePausa">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div id="configAlarme" class="w-full">
                            <select id="tempoAlarmePausa" class="mt-1 block w-full rounded-md border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-200 shadow-sm focus:border-teal-500 focus:ring-teal-500 p-2 text-center text-sm">
                                <option value="1">1 min antes</option>
                                <option value="5" selected>5 min antes</option>
                                <option value="10">10 min antes</option>
                                <option value="15">15 min antes</option>
                            </select>
                        </div>
                        <p id="statusAlarmePausa" class="text-xs text-slate-500 mt-2 italic">Desativado</p>
                    </div>
                </div>
            </div>
            </div>
        </div>
        <footer class="mt-8 p-4 text-sm text-slate-500 dark:text-slate-400 text-center bg-slate-100 dark:bg-slate-800 rounded-b-xl -mx-6 -mb-6 md:-mx-8 md:-mb-8">
            <p>&copy; 2025 Veritime | Criado por <strong>Renato Paiva, Dev</strong></p>
        </footer>
    </div>

    <!-- Fundo (Backdrop) para o menu hambúrguer com efeito ainda mais sutil -->
    <div id="menuBackdrop" class="hidden fixed inset-0 bg-black/10 backdrop-blur-[2px] z-40"></div>

    <script src="script.js" defer></script> 
</body>
</html>
