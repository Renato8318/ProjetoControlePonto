<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Mensal - Veritime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        // Aplica o tema escuro no carregamento da página para evitar FOUC (Flash Of Unstyled Content)
        if (localStorage.getItem('darkMode') === 'true' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Estilos específicos para o calendário */
        .dia-calendario {
            min-height: 100px;
            transition: all 0.2s;
        }
        .dia-calendario:hover {
            transform: scale(1.02);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 flex flex-col items-center p-4 min-h-screen transition-colors duration-300">
    
    <div class="w-full max-w-5xl mx-auto my-6">
        <!-- Cabeçalho e Botão Voltar -->
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 py-2 px-4 rounded-lg shadow font-bold transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Voltar
            </a>
            <h1 class="text-2xl md:text-3xl font-extrabold uppercase tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-500">
                <i class="fas fa-calendar-alt mr-2 text-indigo-500"></i> Relatório Mensal
            </h1>
            <div class="w-[100px]"></div> <!-- Espaçador para centralizar o título -->
        </div>

        <!-- Controles do Mês -->
        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-lg mb-6 flex justify-between items-center">
            <button id="mesAnterior" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors">
                <i class="fas fa-chevron-left text-xl"></i>
            </button>
            
            <h2 id="tituloMes" class="text-xl font-bold text-slate-700 dark:text-slate-200 capitalize">Carregando...</h2>
            
            <button id="mesProximo" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors">
                <i class="fas fa-chevron-right text-xl"></i>
            </button>
        </div>

        <!-- Resumo do Mês -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-indigo-50 dark:bg-slate-800 p-4 rounded-lg border border-indigo-100 dark:border-slate-700 text-center shadow-sm">
                <p class="text-sm text-slate-500 dark:text-slate-400">Total Trabalhado no Mês</p>
                <p id="totalTrabalhadoMes" class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">--:--</p>
            </div>
            <div class="bg-emerald-50 dark:bg-slate-800 p-4 rounded-lg border border-emerald-100 dark:border-slate-700 text-center shadow-sm">
                <p class="text-sm text-slate-500 dark:text-slate-400">Dias Trabalhados</p>
                <p id="diasTrabalhadosMes" class="text-2xl font-bold text-emerald-600 dark:text-emerald-400">0</p>
            </div>
            <div class="bg-amber-50 dark:bg-slate-800 p-4 rounded-lg border border-amber-100 dark:border-slate-700 text-center shadow-sm">
                <p class="text-sm text-slate-500 dark:text-slate-400">Média Diária</p>
                <p id="mediaDiariaMes" class="text-2xl font-bold text-amber-600 dark:text-amber-400">--:--</p>
            </div>
            <div class="bg-blue-50 dark:bg-slate-800 p-4 rounded-lg border border-blue-100 dark:border-slate-700 text-center shadow-sm">
                <p class="text-sm text-slate-500 dark:text-slate-400">Banco de Horas</p>
                <p id="bancoHorasMes" class="text-2xl font-bold text-blue-600 dark:text-blue-400">--:--</p>
            </div>
        </div>

        <!-- Calendário -->
        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg overflow-hidden">
            <!-- Dias da Semana -->
            <div class="grid grid-cols-7 bg-indigo-600 text-white text-center py-2 font-semibold text-sm md:text-base">
                <div>Dom</div>
                <div>Seg</div>
                <div>Ter</div>
                <div>Qua</div>
                <div>Qui</div>
                <div>Sex</div>
                <div>Sáb</div>
            </div>
            
            <!-- Grid de Dias -->
            <div id="calendarGrid" class="grid grid-cols-7 border-l border-t border-slate-200 dark:border-slate-700 bg-slate-200 dark:bg-slate-700 gap-[1px]">
                <!-- Os dias serão inseridos aqui via JS -->
            </div>
        </div>
        
        <footer class="mt-8 text-sm text-slate-500 dark:text-slate-400 text-center">
            <p>&copy; 2025 Veritime</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const API_URL = 'https://692797e9b35b4ffc50126d4f.mockapi.io/api/v1/pontos';
            let dataAtual = new Date();
            let registros = [];
            
            // Elementos DOM
            const tituloMes = document.getElementById('tituloMes');
            const calendarGrid = document.getElementById('calendarGrid');
            const btnAnterior = document.getElementById('mesAnterior');
            const btnProximo = document.getElementById('mesProximo');

            // 1. Carregar Registros
            const carregarRegistros = async () => {
                // Define 'registros' com o cache local como um fallback inicial
                const stored = localStorage.getItem('registrosVeritime');
                registros = stored ? JSON.parse(stored) : [];

                // OTIMIZAÇÃO: Renderiza imediatamente com dados locais (se houver) para evitar a tela de "Carregando..."
                if (registros.length > 0) {
                    renderizarCalendario();
                }

                // Tenta buscar da API e sobrescrever os registros locais
                try {
                    const response = await fetch(`${API_URL}?sortBy=timestamp&order=asc`);
                    
                    // Trata 404 (Not Found) como uma lista vazia, que é um cenário válido.
                    if (response.ok) {
                        registros = await response.json();
                    } else if (response.status !== 404) {
                        // Se o erro for diferente de 404 (ex: 500), loga o erro.
                        console.error("Erro ao buscar dados da API:", response.statusText);
                    }
                    // Se for 404, 'registros' mantém o valor do localStorage (ou vazio), o que está correto.

                } catch (error) {
                    console.error("Erro de rede ao sincronizar histórico:", error);
                } finally {
                    // GARANTIA: O calendário SEMPRE será renderizado no final.
                    renderizarCalendario();
                }
            };

            // 2. Funções Auxiliares de Tempo
            const msToTime = (duration) => {
                if (!duration && duration !== 0) return '00:00';
                
                const isNegative = duration < 0;
                const absDuration = Math.abs(duration);
                
                let totalSeconds = Math.floor(absDuration / 1000);
                let hours = Math.floor(totalSeconds / 3600);
                let minutes = Math.floor((totalSeconds % 3600) / 60);
                const pad = (num) => String(num).padStart(2, '0');
                return `${isNegative ? '-' : ''}${pad(hours)}:${pad(minutes)}`;
            };

            const calcularTempoDia = (registrosDia) => {
                let tempoTotalMs = 0;
                let inicioBloco = null;
                
                // Ordena
                const regs = [...registrosDia].sort((a, b) => a.timestamp - b.timestamp);

                regs.forEach(r => {
                    if (['Entrada', 'Volta Almoço', 'Volta Pausa'].includes(r.tipo)) {
                        inicioBloco = r.timestamp;
                    } else if ((r.tipo === 'Saída Almoço' || r.tipo === 'Saída' || r.tipo === 'Saída Pausa') && inicioBloco) {
                        tempoTotalMs += r.timestamp - inicioBloco;
                        inicioBloco = null;
                    }
                });
                
                // Se o dia for hoje e ainda estiver aberto, calcula até agora
                if (inicioBloco) {
                    const hojeStr = new Date().toLocaleDateString('pt-BR');
                    const diaRegStr = new Date(regs[0].timestamp).toLocaleDateString('pt-BR');
                    if (hojeStr === diaRegStr) {
                         tempoTotalMs += Date.now() - inicioBloco;
                    }
                }

                return tempoTotalMs;
            };

            // 3. Renderizar Calendário
            const renderizarCalendario = () => {
                const ano = dataAtual.getFullYear();
                const mes = dataAtual.getMonth();

                // Carrega Configuração de Meta para cálculos
                const horasMeta = Number(localStorage.getItem('jornadaHoras') || '8');
                const minutosMeta = Number(localStorage.getItem('jornadaMinutos') || '0');
                const metaDiariaMs = (horasMeta * 3600 + minutosMeta * 60) * 1000;

                // Atualiza Título
                const nomeMes = new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(dataAtual);
                tituloMes.textContent = nomeMes;

                // Dados do Mês
                const primeiroDiaDaSemana = new Date(ano, mes, 1).getDay();
                const diasNoMes = new Date(ano, mes + 1, 0).getDate();

                calendarGrid.innerHTML = '';
                
                // Variáveis para o resumo do mês
                let totalMesMs = 0;
                let diasComRegistro = 0;
                let bancoHorasMs = 0;

                // Células vazias antes do dia 1
                for (let i = 0; i < primeiroDiaDaSemana; i++) {
                    const div = document.createElement('div');
                    div.className = 'bg-slate-50 dark:bg-slate-800/50 min-h-[100px]';
                    calendarGrid.appendChild(div);
                }

                // Dias do mês
                for (let dia = 1; dia <= diasNoMes; dia++) {
                    const dataDia = new Date(ano, mes, dia);
                    
                    // Filtrar registros deste dia
                    const registrosDoDia = registros.filter(r => {
                        const d = new Date(r.timestamp);
                        return d.getDate() === dia && d.getMonth() === mes && d.getFullYear() === ano;
                    });

                    const entrada = registrosDoDia.find(r => r.tipo === 'Entrada');
                    const saida = registrosDoDia.reverse().find(r => r.tipo === 'Saída'); 
                    registrosDoDia.reverse(); // Restaura ordem
                    
                    const tempoTrabalhadoMs = calcularTempoDia(registrosDoDia);
                    
                    if (tempoTrabalhadoMs > 0) {
                        // Acumuladores
                        totalMesMs += tempoTrabalhadoMs;
                        diasComRegistro++;
                        
                        // Cálculo do Banco de Horas (Trabalhado - Meta)
                        bancoHorasMs += (tempoTrabalhadoMs - metaDiariaMs);
                    }

                    // HTML da Célula
                    const cell = document.createElement('div');
                    cell.className = 'dia-calendario bg-white dark:bg-slate-800 p-2 flex flex-col justify-between border-b border-r border-slate-100 dark:border-slate-700 relative overflow-hidden';
                    
                    const isToday = new Date().toDateString() === dataDia.toDateString();
                    if (isToday) {
                        cell.classList.add('ring-2', 'ring-inset', 'ring-indigo-500');
                    }

                    // Cor do texto baseada na meta (Verde se >= meta, Vermelho se < meta)
                    // Apenas para dias que já passaram ou que já tem registro completo
                    const corTextoTotal = tempoTrabalhadoMs >= metaDiariaMs ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-500 dark:text-red-400';

                    let infoHtml = '';
                    if (registrosDoDia.length > 0) {
                        infoHtml = `
                            <div class="mt-1 text-xs space-y-1">
                                <div class="flex justify-between text-slate-600 dark:text-slate-400">
                                    <span><i class="fas fa-play text-[10px] mr-1 text-emerald-500"></i>${entrada ? entrada.horario.slice(0, 5) : '--:--'}</span>
                                </div>
                                <div class="flex justify-between text-slate-600 dark:text-slate-400">
                                    <span><i class="fas fa-stop text-[10px] mr-1 text-red-500"></i>${saida ? saida.horario.slice(0, 5) : '--:--'}</span>
                                </div>
                                <div class="pt-1 mt-1 border-t border-slate-100 dark:border-slate-700 font-bold text-center ${corTextoTotal}">
                                    ${msToTime(tempoTrabalhadoMs)}
                                </div>
                            </div>
                        `;
                    } else {
                        infoHtml = `<div class="h-full flex items-center justify-center text-slate-300 dark:text-slate-600 text-xs italic">Sem registro</div>`;
                    }

                    cell.innerHTML = `
                        <span class="font-bold text-sm ${isToday ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-700 dark:text-slate-300'}">${dia}</span>
                        ${infoHtml}
                    `;
                    
                    calendarGrid.appendChild(cell);
                }

                // Atualiza painel de resumo
                document.getElementById('totalTrabalhadoMes').textContent = msToTime(totalMesMs);
                document.getElementById('diasTrabalhadosMes').textContent = diasComRegistro;
                
                const mediaMs = diasComRegistro > 0 ? totalMesMs / diasComRegistro : 0;
                document.getElementById('mediaDiariaMes').textContent = msToTime(mediaMs);

                // Atualiza Banco de Horas
                const elBanco = document.getElementById('bancoHorasMes');
                if (elBanco) {
                    elBanco.textContent = msToTime(bancoHorasMs);
                    // Muda a cor do banco de horas (Verde positivo, Vermelho negativo)
                    elBanco.className = `text-2xl font-bold ${bancoHorasMs >= 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-500 dark:text-red-400'}`;
                }
            };

            // Event Listeners
            btnAnterior.addEventListener('click', () => {
                dataAtual.setMonth(dataAtual.getMonth() - 1);
                renderizarCalendario();
            });

            btnProximo.addEventListener('click', () => {
                dataAtual.setMonth(dataAtual.getMonth() + 1);
                renderizarCalendario();
            });

            // Inicializa
            carregarRegistros();
            });
    </script>
</body>
</html>
